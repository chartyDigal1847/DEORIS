# Optional Apache snippet for Laravel Reverb behind https://deoris.test
# Add inside the *:443 VirtualHost for deoris.test, then restart Apache.
#
# Requires: mod_proxy, mod_proxy_wstunnel enabled in httpd.conf

ProxyPreserveHost On
RequestHeader set X-Forwarded-Proto "https"

# WebSocket traffic for Laravel Echo / Reverb
ProxyPass        /app ws://127.0.0.1:8080/app
ProxyPassReverse /app ws://127.0.0.1:8080/app

# Then in .env for the portal:
# REVERB_HOST=deoris.test
# REVERB_PORT=8080
# REVERB_SCHEME=https
# VITE_REVERB_HOST=deoris.test
# VITE_REVERB_PORT=443
# VITE_REVERB_SCHEME=https
# VITE_REVERB_ENABLED=true
