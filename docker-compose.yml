x-module-app: &module-app
  build:
    context: .
    dockerfile: docker/Dockerfile.module
  restart: unless-stopped
  working_dir: /var/www
  environment:
    - APP_ENV=${APP_ENV:-production}
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - deoris_network

services:

  # ─── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: deoris_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ..:/opt/deoris:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/modules.conf:/etc/nginx/conf.d/modules.conf
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_started
      module_entryease:
        condition: service_started
      module_enrollease:
        condition: service_started
      module_gradetrack:
        condition: service_started
      module_meditrack:
        condition: service_started
      module_librarysys:
        condition: service_started
      module_taskflow:
        condition: service_started
      module_careerconnect:
        condition: service_started
      module_assesspay:
        condition: service_started
      module_votesys:
        condition: service_started
      module_clearcheck:
        condition: service_started
    networks:
      - deoris_network

  # ─── PHP-FPM (Laravel App) ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deoris_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=${APP_ENV:-production}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - deoris_network

  # ─── MySQL ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: deoris_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-deoris_identity_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret-root-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-deoris}
    volumes:
      - deoris_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - deoris_network

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: deoris_redis
    restart: unless-stopped
    volumes:
      - deoris_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - deoris_network

  # ─── Queue Worker ─────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deoris_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work redis --queue=events,notifications,default --tries=3 --timeout=90 --sleep=3
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - deoris_network

  # ─── Laravel Reverb (WebSockets) ──────────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deoris_reverb
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - deoris_network

  # ─── Redis Event Listener ───────────────────────────────────────────────────
  redis_listener:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deoris_redis_listener
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan deoris:events:listen
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - deoris_network

  # ─── Scheduler Worker ───────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deoris_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan schedule:work
    depends_on:
      app:
        condition: service_started
    networks:
      - deoris_network

  # ─── Module PHP-FPM Apps ────────────────────────────────────────────────────
  module_entryease:
    <<: *module-app
    container_name: deoris_module_entryease
    volumes:
      - ../entryEase:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini

  module_enrollease:
    <<: *module-app
    container_name: deoris_module_enrollease
    volumes:
      - ../EnrollEase:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini

  module_gradetrack:
    <<: *module-app
    container_name: deoris_module_gradetrack
    volumes:
      - ../gradeTrack:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini

  module_meditrack:
    <<: *module-app
    container_name: deoris_module_meditrack
    volumes:
      - ../MediTrack:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini

  module_librarysys:
    <<: *module-app
    container_name: deoris_module_librarysys
    volumes:
      - ../LibrarySys:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini

  module_taskflow:
    <<: *module-app
    container_name: deoris_module_taskflow
    volumes:
      - ../taskflow:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini

  module_careerconnect:
    <<: *module-app
    container_name: deoris_module_careerconnect
    volumes:
      - ../carrerConnect:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini

  module_assesspay:
    <<: *module-app
    container_name: deoris_module_assesspay
    volumes:
      - ../asssesspay:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini

  module_votesys:
    <<: *module-app
    container_name: deoris_module_votesys
    volumes:
      - ../VoteSys:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini

  module_clearcheck:
    <<: *module-app
    container_name: deoris_module_clearcheck
    volumes:
      - ../ClearCheck:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  deoris_mysql_data:
    driver: local
  deoris_redis_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  deoris_network:
    driver: bridge
