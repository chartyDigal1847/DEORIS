# Module subdomains — served by dedicated PHP-FPM containers.
# Parent repo mount: /opt/deoris (sibling folders of DEORIS).

# ─── EntryEase ───────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name entryease.deoris.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name entryease.deoris.net;

    root /opt/deoris/entryEase/public;
    index index.php index.html;

    ssl_certificate     /etc/nginx/certs/deoris.net.crt;
    ssl_certificate_key /etc/nginx/certs/deoris.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass   module_entryease:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

